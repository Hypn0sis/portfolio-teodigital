<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeoDigital — Portfolio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Anton&display=swap');
  
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:Inter,sans-serif;background:#0a0a0a;color:#eee;
    padding:24px 16px 60px;
  }
  .container{max-width:1200px;margin:0 auto}

  header{text-align:center;margin-bottom:30px}
  header h1{font-size:2rem;font-weight:800;letter-spacing:-1px;color:#fff}
  header h1 span{color:#e04545}
  header p{color:#666;font-size:0.85rem;margin-top:4px}
  header .back{
    display:inline-block;margin-top:8px;font-size:0.75rem;color:#555;
    text-decoration:none;
  }
  header .back:hover{color:#e04545}

  /* TABS */
  .cat-tabs{
    display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:28px;
  }
  .cat-btn{
    padding:10px 20px;border:1px solid #222;background:#121212;color:#777;
    border-radius:8px;font-family:Inter,sans-serif;font-size:0.8rem;font-weight:600;
    cursor:pointer;transition:all .2s;
  }
  .cat-btn:hover{border-color:#e04545;color:#e04545}
  .cat-btn.active{background:#e04545;border-color:#e04545;color:#fff}

  .cat-content{display:none}
  .cat-content.active{display:block}

  /* CARD GRID */
  .card-grid{
    display:grid;grid-template-columns:repeat(5,1fr);gap:12px;
  }
  .card{
    position:relative;border-radius:12px;overflow:hidden;
    background:#121212;cursor:pointer;transition:all .3s;
    aspect-ratio:3/4;display:flex;flex-direction:column;
    border:1px solid #1e1e1e;
  }
  .card:hover{
    transform:translateY(-4px);
    border-color:#e04545;
    box-shadow:0 12px 40px rgba(224,69,69,.1);
  }
  .card .cp{
    flex:1;display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }
  .card .cp-bg{position:absolute;inset:0;transition:transform .4s}
  .card:hover .cp-bg{transform:scale(1.08)}
  .card .cp-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45)}
  .card .cp-content{position:relative;z-index:2;text-align:center;padding:16px}
  .card .cp-icon{font-size:2rem;margin-bottom:6px;display:block}
  .card .style-tag{
    display:inline-block;padding:4px 10px;border-radius:4px;
    font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  }
  .card .cf{
    padding:12px 14px;border-top:1px solid #1e1e1e;
    display:flex;justify-content:space-between;align-items:center;
  }
  .card .cf-name{font-size:0.78rem;font-weight:600;color:#fff}
  .card .cf-num{font-size:0.6rem;color:#555;background:#1a1a1a;padding:2px 8px;border-radius:4px}

  /* Style tag colors */
  .st-moderno{background:#1a1a1a;color:#fff}
  .st-caldo{background:#b85c2a;color:#fff}
  .st-vivace{background:linear-gradient(135deg,#e94560,#f77f00);color:#fff}
  .st-editoriale{background:#fff;color:#1a1a1a}
  .st-pop{background:#e91e63;color:#fff}

  /* OVERLAY */
  .overlay{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,.94);z-index:1000;
    overflow-y:auto;padding:16px;
    backdrop-filter:blur(20px);
  }
  .overlay.open{display:block}

  .overlay-inner{max-width:960px;margin:20px auto;border-radius:16px;overflow:hidden;background:#121212}
  .overlay-close{
    position:fixed;top:16px;right:20px;z-index:1100;
    width:44px;height:44px;border-radius:50%;
    background:#e04545;border:none;color:#fff;
    font-size:1.3rem;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;
  }
  .overlay-close:hover{background:#fff;color:#1a1a1a}

  .overlay-header{
    display:flex;justify-content:space-between;align-items:center;
    padding:16px 24px;background:#121212;border-bottom:1px solid #1e1e1e;
  }
  .overlay-header h3{font-size:1rem;font-weight:600;color:#fff}
  .overlay-header .ol{color:#666;font-size:0.75rem}

  /* Mockup sections - all share image overlays */
  .mockup-hero{
    position:relative;overflow:hidden;min-height:420px;
    display:flex;align-items:center;
  }
  .mockup-hero .mh-bg{
    position:absolute;inset:0;
    background-size:cover;background-position:center;
    transition:transform 6s ease;
  }
  .mockup-hero:hover .mh-bg{transform:scale(1.03)}
  .mockup-hero .mh-shade{position:absolute;inset:0}
  .mockup-hero .mh-content{
    position:relative;z-index:2;padding:60px 50px;width:100%;
  }

  .mockup-features{
    display:grid;grid-template-columns:repeat(3,1fr);
  }
  .mockup-features .mf-card{padding:36px 28px;text-align:center;border-left:1px solid}
  .mockup-features .mf-card:first-child{border-left:none}

  .mockup-cta{text-align:center;padding:50px 28px}

  /* ===== STYLE 1: MODERNO ===== */
  .fm-moderno{
    font-family:Inter,sans-serif;
  }
  .fm-moderno .mh-shade{
    background:linear-gradient(135deg,rgba(250,250,249,.92) 0%,rgba(250,250,249,.6) 100%);
  }
  .fm-moderno .mh-content{color:#1a1a1a}
  .fm-moderno .mh-content h2{
    font-family:'DM Serif Display',serif;font-size:2.8rem;font-weight:400;line-height:1.1;
    margin-bottom:12px;
  }
  .fm-moderno .mh-content em{font-style:italic;color:#e04545}
  .fm-moderno .mh-content p{color:#666;font-size:0.95rem;max-width:420px;line-height:1.6;margin-bottom:20px}
  .fm-moderno .mh-content .btn{display:inline-block;padding:12px 30px;background:#1a1a1a;color:white;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.85rem}
  .fm-moderno .mf-card{background:#fafaf9;border-left-color:#eee;color:#1a1a1a}
  .fm-moderno .mf-card h3{font-size:0.85rem;font-weight:600;margin-bottom:6px}
  .fm-moderno .mf-card p{color:#888;font-size:0.8rem;line-height:1.5}
  .fm-moderno .mf-icon{font-size:1.6rem;margin-bottom:8px;display:block}
  .fm-moderno .mockup-cta{background:#fafaf9;color:#1a1a1a}

  /* ===== STYLE 2: CALDO ===== */
  .fm-caldo{
    font-family:'DM Serif Display',serif;
  }
  .fm-caldo .mh-shade{
    background:linear-gradient(135deg,rgba(250,243,237,.93) 0%,rgba(240,228,214,.7) 100%);
  }
  .fm-caldo .mh-content{color:#2d1f14}
  .fm-caldo .mh-content h2{font-size:3rem;font-weight:400;line-height:1.08;margin-bottom:10px}
  .fm-caldo .mh-content h2 span{color:#b85c2a}
  .fm-caldo .mh-content p{
    font-family:Inter,sans-serif;color:#8b6f5a;font-size:0.9rem;max-width:420px;line-height:1.6;margin-bottom:20px
  }
  .fm-caldo .mh-content .btn{
    display:inline-block;padding:12px 34px;background:#b85c2a;color:#fff;
    border-radius:30px;font-family:Inter,sans-serif;font-weight:600;font-size:0.85rem;text-decoration:none;
  }
  .fm-caldo .mf-card{background:#faf3ed;color:#2d1f14;border-left-color:#dccfc1}
  .fm-caldo .mf-card h3{font-family:Inter,sans-serif;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;color:#b85c2a}
  .fm-caldo .mf-card p{font-family:Inter,sans-serif;color:#8b6f5a;font-size:0.8rem;line-height:1.5}
  .fm-caldo .mf-icon{font-size:1.6rem;margin-bottom:8px;display:block}
  .fm-caldo .mockup-cta{background:#faf3ed;color:#2d1f14}

  /* ===== STYLE 3: VIVACE ===== */
  .fm-vivace{
    font-family:'Space Grotesk',sans-serif;
  }
  .fm-vivace .mh-shade{
    background:linear-gradient(135deg,rgba(26,26,46,.94) 0%,rgba(22,33,62,.85) 100%);
  }
  .fm-vivace .mh-content{color:#fff}
  .fm-vivace .mh-content h2{font-size:2.8rem;font-weight:700;line-height:1.05;letter-spacing:-1px;margin-bottom:12px}
  .fm-vivace .mh-content .accent{
    background:linear-gradient(135deg,#e94560,#f77f00);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .fm-vivace .mh-content p{color:#a0aec0;font-size:0.9rem;max-width:400px;line-height:1.6;margin-bottom:20px}
  .fm-vivace .mh-content .btn{
    display:inline-block;padding:12px 28px;
    background:linear-gradient(135deg,#e94560,#f77f00);color:#fff;border-radius:8px;
    font-weight:600;font-size:0.85rem;text-decoration:none;
  }
  .fm-vivace .mf-card{background:#1a1a2e;color:#fff;border-left-color:#2a2a4a}
  .fm-vivace .mf-card h3{font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;color:#e94560}
  .fm-vivace .mf-card p{color:#a0aec0;font-size:0.8rem;line-height:1.5}
  .fm-vivace .mf-icon{font-size:1.6rem;margin-bottom:8px;display:block}
  .fm-vivace .mockup-cta{background:#16213e;color:#fff}

  /* ===== STYLE 4: EDITORIALE ===== */
  .fm-editoriale{
    font-family:'Cormorant Garamond',serif;
  }
  .fm-editoriale .mockup-hero{min-height:480px}
  .fm-editoriale .mh-shade{
    background:linear-gradient(90deg,rgba(255,255,255,.95) 0%,rgba(200,200,200,.3) 50%,transparent 100%);
  }
  .fm-editoriale .mh-content{color:#1a1a1a;max-width:450px}
  .fm-editoriale .mh-content .sup{
    font-family:Inter,sans-serif;font-size:0.6rem;text-transform:uppercase;letter-spacing:3px;color:#999;margin-bottom:14px;display:block;
  }
  .fm-editoriale .mh-content h2{font-size:3.2rem;font-style:italic;font-weight:400;line-height:1.05;margin-bottom:16px}
  .fm-editoriale .mh-content p{font-family:Inter,sans-serif;color:#777;font-size:0.85rem;line-height:1.7;margin-bottom:24px}
  .fm-editoriale .mh-content .btn{
    display:inline-block;padding:12px 32px;border:1px solid #1a1a1a;color:#1a1a1a;
    font-family:Inter,sans-serif;font-size:0.7rem;font-weight:500;text-transform:uppercase;letter-spacing:2px;text-decoration:none;
  }
  .fm-editoriale .mf-card{background:#fff;color:#1a1a1a;border-left-color:#eee}
  .fm-editoriale .mf-card h3{font-family:Inter,sans-serif;font-size:0.6rem;text-transform:uppercase;letter-spacing:2px;color:#999;margin-bottom:8px}
  .fm-editoriale .mf-card p{font-family:Inter,sans-serif;color:#888;font-size:0.78rem;line-height:1.6}
  .fm-editoriale .mf-icon{font-size:1.6rem;margin-bottom:8px;display:block}
  .fm-editoriale .mockup-cta{background:#fff;color:#1a1a1a}

  /* ===== STYLE 5: POP ===== */
  .fm-pop{
    font-family:Inter,sans-serif;
  }
  .fm-pop .mh-shade{
    background:linear-gradient(135deg,rgba(255,214,0,.88) 0%,rgba(255,111,0,.75) 50%,rgba(233,30,99,.6) 100%);
  }
  .fm-pop .mh-content{color:#1a1a1a;text-align:center}
  .fm-pop .mh-content .sup{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:3px;opacity:.6;margin-bottom:10px;display:block}
  .fm-pop .mh-content h2{
    font-family:'Anton',sans-serif;font-size:4rem;text-transform:uppercase;line-height:1;letter-spacing:-2px;margin-bottom:10px;
  }
  .fm-pop .mh-content p{max-width:380px;margin:0 auto 22px;opacity:.8;font-size:0.9rem;line-height:1.5}
  .fm-pop .mh-content .btn{
    display:inline-block;padding:14px 40px;background:#1a1a1a;color:#ffd600;
    border-radius:30px;font-weight:700;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;text-decoration:none;
  }
  .fm-pop .mf-card{background:#fffde7;color:#1a1a1a;border-left-color:#ffe082}
  .fm-pop .mf-card h3{font-family:'Anton',sans-serif;font-size:1rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;color:#e91e63}
  .fm-pop .mf-card p{color:#666;font-size:0.8rem;line-height:1.5}
  .fm-pop .mf-icon{font-size:1.6rem;margin-bottom:8px;display:block}
  .fm-pop .mockup-cta{background:#fffde7;color:#1a1a1a}

  .style-nav{
    display:flex;justify-content:center;gap:8px;padding:16px;flex-wrap:wrap;
  }
  .style-nav-btn{
    padding:7px 16px;border:1px solid #333;background:transparent;color:#888;
    border-radius:6px;font-size:0.7rem;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;
    transition:all .2s;
  }
  .style-nav-btn.active{background:#e04545;border-color:#e04545;color:#fff}
  .style-nav-btn:hover{border-color:#e04545;color:#e04545}

  @media(max-width:800px){
    .card-grid{grid-template-columns:repeat(2,1fr)}
    .mockup-hero .mh-content{padding:40px 24px}
    .mockup-features{grid-template-columns:1fr}
    .mockup-features .mf-card{border-left:none;border-top:1px solid}
    .fm-pop .mh-content h2{font-size:2.5rem}
    .fm-moderno .mh-content h2,.fm-vivace .mh-content h2,.fm-editoriale .mh-content h2,.fm-caldo .mh-content h2{font-size:2rem}
  }
  @media(max-width:500px){
    .card-grid{grid-template-columns:1fr 1fr}
    .overlay-close{top:10px;right:10px}
  }
</style>
</head>

function buildCards(catId){
  const el = document.getElementById('content' + catId.charAt(0).toUpperCase() + catId.slice(1));
  const data = CONTENT[catId].data;
  const img = IMGS[catId];
  let html = '<div class="card-grid">';
  data.forEach((s, i) => {
    const sty = STYLES[i];
    html += `<div class="card" onclick="openOverlay('${catId}', ${i})">
      <div class="cp">
        <div class="cp-bg" style="background:url('${img}') center/cover"></div>
        <div class="cp-overlay"></div>
        <div class="cp-content">
          <span class="cp-icon">${CATS[catId].icon}</span>
          <span class="style-tag ${sty.tagCl}">${sty.label}</span>
        </div>
      </div>
      <div class="cf">
        <span class="cf-name">${sty.label}</span>
        <span class="cf-num">${i+1}/5</span>
      </div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function buildMockup(catId, idx){
  const d = CONTENT[catId].data[idx];
  const sty = STYLES[idx];
  const img = IMGS[catId];
  const catName = CONTENT[catId].name;
  
  // Features from data
  const fts = d.features.map(f => 
    `<div class="mf-card"><span class="mf-icon">${f.split(' ')[0]}</span><h3>${f.slice(2)}</h3><p>Scopri di più sul nostro servizio.</p></div>`
  ).join('');

  return `<div class="fm-${sty.id}">
    <div class="mockup-hero">
      <div class="mh-bg" style="background-image:url('${img}')"></div>
      <div class="mh-shade"></div>
      <div class="mh-content">
        <h2>${d.h2}</h2>
        <p>${d.p}</p>
        <span class="btn">Scopri di più →</span>
      </div>
    </div>
    <div class="mockup-features">
      ${fts}
    </div>
    <div class="mockup-cta">
      <p style="font-size:0.85rem;color:var(--muted);margin-bottom:16px;opacity:.6">📍 [Indirizzo] · 📞 [Telefono] · 📱 @[social]</p>
      <p style="font-size:0.7rem;opacity:.3">Questo è un esempio di come potrebbe apparire il tuo sito.</p>
    </div>
  </div>`;
}

function buildNav(catId, idx){
  const sty = STYLES;
  return sty.map((s, i) => 
    `<button class="style-nav-btn ${i===idx?'active':''}" onclick="openOverlay('${catId}', ${i})">${s.label}</button>`
  ).join('');
}

// Build tabs
const tabIds = Object.keys(CATS);
tabIds.forEach((id, i) => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (i===0?' active':'');
  btn.textContent = CATS[id].label;
  btn.setAttribute('onclick', `showCategory('${id}')`);
  document.getElementById('catTabs').appendChild(btn);
});

function showCategory(catId){
  document.querySelectorAll('.cat-content').forEach(c => c.classList.remove('active'));
  document.getElementById('content' + catId.charAt(0).toUpperCase() + catId.slice(1)).classList.add('active');
  document.querySelectorAll('.cat-btn').forEach(b => {
    const catKey = tabIds.find(id => b.textContent.includes(CATS[id].label.slice(2)));
    b.classList.toggle('active', catKey === catId);
  });
}

function openOverlay(catId, idx){
  const html = `
    <div class="overlay-header">
      <div><h3>${CATS[catId].icon} ${STYLES[idx].label} · ${CONTENT[catId].name}</h3><div class="ol">Stile ${idx+1} di 5</div></div>
    </div>
    <div class="om-content">${buildMockup(catId, idx)}</div>
    <div class="style-nav">${buildNav(catId, idx)}</div>
  `;
  document.getElementById('overlayInner').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOverlay(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Init
Object.keys(CATS).forEach(cat => buildCards(cat));
showCategory('macelleria');
</script>
